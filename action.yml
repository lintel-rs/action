name: "Lintel Schema Validation"
description: "Validate JSON, YAML, and TOML files against JSON Schema"
author: "lintel-rs"

branding:
  icon: "check-circle"
  color: "blue"

inputs:
  version:
    description: "lintel version to install (default: latest)"
    required: false
    default: "latest"
  github-token:
    description: "GitHub token for creating Check Runs"
    required: false
    default: ${{ github.token }}
  paths:
    description: "Paths or globs to validate"
    required: false
    default: ""
  exclude:
    description: "Exclude patterns (can be repeated, comma-separated)"
    required: false
    default: ""
  no-catalog:
    description: "Disable SchemaStore catalog matching"
    required: false
    default: "false"
  args:
    description: "Additional arguments to pass to lintel github-action"
    required: false
    default: ""

runs:
  using: "composite"
  steps:
    - name: Install lintel
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.github-token }}
        LINTEL_VERSION: ${{ inputs.version }}
      run: |
        set -euo pipefail

        if [ "$LINTEL_VERSION" = "latest" ]; then
          LINTEL_VERSION=$(gh release view --repo lintel-rs/action --json tagName -q .tagName 2>/dev/null || echo "")
          if [ -z "$LINTEL_VERSION" ]; then
            echo "::error::Failed to determine latest lintel version"
            exit 1
          fi
        fi

        URL="https://github.com/lintel-rs/lintel/releases/download/${LINTEL_VERSION}/lintel-x86_64-unknown-linux-musl.tar.gz"
        echo "Downloading lintel ${LINTEL_VERSION}..."

        curl -sL "$URL" | tar xz -C /usr/local/bin
        chmod +x /usr/local/bin/lintel
        echo "Installed lintel ${LINTEL_VERSION}"

    - name: Run Lintel
      shell: bash
      env:
        GITHUB_TOKEN: ${{ inputs.github-token }}
      run: |
        ARGS=""

        if [ -n "${{ inputs.paths }}" ]; then
          ARGS="${{ inputs.paths }}"
        fi

        if [ -n "${{ inputs.exclude }}" ]; then
          IFS=',' read -ra EXCLUDES <<< "${{ inputs.exclude }}"
          for pattern in "${EXCLUDES[@]}"; do
            ARGS="$ARGS --exclude $(echo "$pattern" | xargs)"
          done
        fi

        if [ "${{ inputs.no-catalog }}" = "true" ]; then
          ARGS="$ARGS --no-catalog"
        fi

        if [ -n "${{ inputs.args }}" ]; then
          ARGS="$ARGS ${{ inputs.args }}"
        fi

        lintel github-action $ARGS
